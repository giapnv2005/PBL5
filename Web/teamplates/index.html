<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hệ Thống Phân Loại Linh Kiện</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <header>
      <h1>HỆ THỐNG PHÂN LOẠI LINH KIỆN</h1>
    </header>

    <main class="container">
      <section class="left panel">
        <h2>Camera</h2>
        <img id="videoStream" alt="Camera stream" />

        <h2>Ảnh vừa chụp</h2>
        <img id="captureImage" alt="Anh da chup" />
      </section>

      <section class="right panel">
        <div class="panel-header">
          <h2>Kết quả phân loại</h2>
          <a class="history-btn" href="/history">Lịch sử</a>
        </div>

        <div id="countCards" class="result" aria-live="polite"></div>

        <div class="meta">
          <p><strong>Label:</strong> <span id="lastLabel">N/A</span></p>
          <p><strong>Confidence:</strong> <span id="lastConfidence">0.00</span></p>
          <p><strong>Queue:</strong> <span id="queueSize">0</span></p>
          <p><strong>System:</strong> <span id="systemState">running</span></p>
        </div>

        <div class="control">
          <button id="startBtn" type="button">Bắt đầu</button>
          <button id="stopBtn" type="button">Dừng</button>
          <button id="testTriggerBtn" type="button">Test Trigger</button>
        </div>
      </section>
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
  </body>
</html>
